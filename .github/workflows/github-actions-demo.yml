name: Webscaper Automation
run-name: Setting my scraper on a daily schedule
on:
  [push]
 # schedule:
  # - cron: "30 6 * * *"

jobs:
  Automate-my-webscraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
      - name: set up python
        uses: actions/checkout@v6
        with:
          python-version: '3.13' 
      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
      - name: execute py script
        run: |
         python scrape.py

